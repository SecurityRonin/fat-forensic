name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo test --workspace --all-features

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: cargo build --workspace --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.9
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  coverage:
    name: Coverage (100% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-llvm-cov
      # The reader is generic over R, so error closures monomorphize per reader
      # type — making region/function metrics structurally < 100%. The
      # meaningful, monomorphization-robust invariant is that every executable
      # source LINE is hit at least once. Defensive arms provably unreachable
      # under a dominating invariant carry a `// cov:unreachable` marker and are
      # exempt; the gate fails on any OTHER zero-hit line.
      # The published libraries (fat-core, fat-forensic) are gated at 100%.
      # fat-forensic-cli is a publish=false debug binary whose logic lives in the
      # tested run_args; its main() shell is excluded from the line gate.
      - name: Generate lcov
        run: cargo llvm-cov --workspace --exclude fat-forensic-cli --all-features --lcov --output-path lcov.info
      - name: Enforce line coverage
        shell: bash
        run: |
          fail=0
          while IFS= read -r line; do
            if [[ "$line" == SF:* ]]; then
              f="${line#SF:}"
            elif [[ "$line" =~ ^DA:([0-9]+),0$ ]]; then
              n="${BASH_REMATCH[1]}"
              src="$(sed -n "${n}p" "$f")"
              trimmed="$(echo "$src" | tr -d '[:space:]')"
              if [[ "$src" == *cov:unreachable* ]]; then
                echo "exempt (// cov:unreachable): $f:$n"
              elif [[ "$trimmed" =~ ^[\}\)\;\?,]*$ ]]; then
                echo "exempt (delimiter-only artifact): $f:$n:$src"
              else
                echo "::error::Uncovered line $f:$n:$src"
                fail=1
              fi
            fi
          done < lcov.info
          if [[ "$fail" -ne 0 ]]; then exit 1; fi
          echo "All executable lines covered, or annotated // cov:unreachable."

  rustdoc:
    name: Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2.7.8
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps
